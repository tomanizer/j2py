[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "j2py"
version = "0.1.0"
description = "Java to Python source converter with line-level semantic equivalence"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "tree-sitter>=0.23",
    "tree-sitter-java>=0.23",
    "networkx>=3.3",
    "anthropic>=0.30",
    "pydantic>=2.7",
    "typer>=0.12",
    "rich>=13.7",
    "diskcache>=5.6",
    "tenacity>=8.3",
    "ruff>=0.4",
    "mypy>=1.10",
]

[project.scripts]
j2py = "j2py.cli.main:app"

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
    "pytest-cov>=5.0",
    "pytest-snapshot>=0.9",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.lint.per-file-ignores]
"j2py/cli/*.py" = ["B008"]  # typer uses function calls in argument defaults by design

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short"
markers = [
    "target_translation: roadmap Java-to-Python translation targets that are excluded from make check",
]
