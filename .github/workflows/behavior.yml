name: Behavior

on:
  push:
    branches: [main]
    paths:
      - "j2py/**"
      - "tests/behavior/**"
      - "tests/fixtures/behavior/**"
      - "scripts/corpus/gen_behavior_corpus.py"
      - ".github/workflows/behavior.yml"
  pull_request:
    branches: [main]
    paths:
      - "j2py/**"
      - "tests/behavior/**"
      - "tests/fixtures/behavior/**"
      - "scripts/corpus/gen_behavior_corpus.py"
      - ".github/workflows/behavior.yml"
  workflow_dispatch:

concurrency:
  group: behavior-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  behavior-equivalence:
    name: Behavior equivalence (rule-layer, JDK)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
      - run: uv sync --locked --extra dev
      - name: Run behavior-equivalence corpus
        run: make test-behavior
