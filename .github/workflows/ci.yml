name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
      - run: uv sync --locked --extra dev
      - run: make lint

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
      - run: uv sync --locked --extra dev
      - run: uv run mypy j2py/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --locked --extra dev
      - run: uv run pytest --tb=short -m "not behavior and not live_llm"

  quality-control:
    name: Quality control
    runs-on: ubuntu-latest
    # Always runs — this is the mandatory gate
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
      - run: uv sync --locked --extra dev
      - name: Import smoke test
        run: make import-smoke
      - name: Lint
        run: make lint
      - name: Type check
        run: uv run mypy j2py/

  ci-required:
    name: CI required (aggregator)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, quality-control]
    if: always()
    steps:
      - name: Check all required jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "lint failed"; exit 1
          fi
          if [[ "${{ needs.typecheck.result }}" != "success" ]]; then
            echo "typecheck failed"; exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "test failed"; exit 1
          fi
          if [[ "${{ needs.quality-control.result }}" != "success" ]]; then
            echo "quality-control failed"; exit 1
          fi
          echo "All required jobs passed."
