name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-control:
    name: Quality control
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.11"
          extras: validate
      - name: Import smoke test
        run: make import-smoke
      - run: make lint
      - run: make typecheck

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ matrix.python-version }}
          extras: test
      - name: Run tests
        if: matrix.python-version != '3.11'
        run: make test-ci-py312
      - name: Run tests, coverage, and equivalence surface report
        if: matrix.python-version == '3.11'
        run: make test-ci-py311
      - name: Upload equivalence surface report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v6
        with:
          name: equivalence-surface
          path: corpus-reports/equivalence-surface.json
      - name: Upload coverage XML
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml
          path: coverage.xml

  ci-required:
    name: CI required (aggregator)
    runs-on: ubuntu-latest
    needs: [quality-control, test]
    if: always()
    steps:
      - name: Check all required jobs passed
        run: |
          if [[ "${{ needs.quality-control.result }}" != "success" ]]; then
            echo "quality-control failed"; exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "test failed"; exit 1
          fi
          echo "All required jobs passed."
