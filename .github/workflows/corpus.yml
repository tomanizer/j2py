name: Corpus

on:
  pull_request:
    branches: [main]
    paths:
      - "j2py/**"
      - "scripts/corpus/**"
      - "tests/fixtures/corpus/**"
      - "tests/corpus/**"
      - ".github/workflows/corpus.yml"
  push:
    branches: [main]
    paths:
      - "j2py/**"
      - "scripts/corpus/**"
      - "tests/fixtures/corpus/**"
      - "tests/corpus/**"
      - ".github/workflows/corpus.yml"
  workflow_dispatch:

concurrency:
  group: corpus-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spring-dense-baseline:
    name: Dense Spring corpus baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      - run: uv sync --locked --extra dev
      - name: Compare dense Spring + construct sample against committed baseline
        run: >
          uv run python scripts/corpus/translate_spring_sample.py
          --clone
          --preset spring-dense
          --compare-baseline
          --fail-on-regression
