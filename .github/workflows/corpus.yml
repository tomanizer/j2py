name: Corpus

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "j2py/**"
      - "scripts/corpus/**"
      - "tests/fixtures/corpus/**"
      - "tests/corpus/**"
      - "Makefile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/corpus.yml"
  push:
    branches: [main]
    paths:
      - "j2py/**"
      - "scripts/corpus/**"
      - "tests/fixtures/corpus/**"
      - "tests/corpus/**"
      - "Makefile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/corpus.yml"
  workflow_dispatch:

concurrency:
  group: corpus-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  corpus-hotspots:
    name: Multi-library corpus scorecard
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.11"
          extras: none
      - name: Aggregate committed baseline scorecard and hotspots
        run: uv run python scripts/corpus/aggregate_hotspots.py --top 8

  dense-baseline:
    name: ${{ matrix.preset }} corpus baseline
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        preset:
          - spring-dense
          - spring-app-dense
          - petclinic
          - guava-dense
          - commons-lang-dense
          - jackson-dense
          - caffeine-dense
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.11"
          extras: none
      - name: Resolve corpus cache key
        id: corpus-cache-key
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from scripts.corpus.corpus_presets import get_preset

          preset = get_preset("${{ matrix.preset }}")
          print(f"checkout_dir={preset.checkout_dir}")
          print(f"ref={preset.ref}")
          PY
      - name: Restore corpus checkout cache
        uses: actions/cache@v4
        with:
          path: .corpus/${{ steps.corpus-cache-key.outputs.checkout_dir }}
          key: corpus-${{ runner.os }}-${{ steps.corpus-cache-key.outputs.checkout_dir }}-${{ steps.corpus-cache-key.outputs.ref }}-${{ hashFiles('scripts/corpus/corpus_presets.py') }}
          restore-keys: |
            corpus-${{ runner.os }}-${{ steps.corpus-cache-key.outputs.checkout_dir }}-${{ steps.corpus-cache-key.outputs.ref }}-
      - name: Compare ${{ matrix.preset }} against committed baseline
        run: >
          uv run python scripts/corpus/translate_corpus.py
          --clone
          --preset ${{ matrix.preset }}
          --compare-baseline
          --fail-on-regression
