name: Corpus

on:
  pull_request:
    branches: [main]
    paths:
      - "j2py/**"
      - "scripts/corpus/**"
      - "tests/fixtures/corpus/**"
      - "tests/corpus/**"
      - "Makefile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/corpus.yml"
  push:
    branches: [main]
    paths:
      - "j2py/**"
      - "scripts/corpus/**"
      - "tests/fixtures/corpus/**"
      - "tests/corpus/**"
      - "Makefile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/corpus.yml"
  workflow_dispatch:

concurrency:
  group: corpus-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  corpus-hotspots:
    name: Multi-library corpus scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      - run: uv sync --locked --extra dev
      - name: Aggregate committed baseline scorecard and hotspots
        run: uv run python scripts/corpus/aggregate_hotspots.py --top 8

  dense-baseline:
    name: ${{ matrix.preset }} corpus baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        preset:
          - spring-dense
          - guava-dense
          - commons-lang-dense
          - jackson-dense
          - caffeine-dense
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      - run: uv sync --locked --extra dev
      - name: Compare ${{ matrix.preset }} against committed baseline
        run: >
          uv run python scripts/corpus/translate_corpus.py
          --clone
          --preset ${{ matrix.preset }}
          --compare-baseline
          --fail-on-regression
