name: Set up Python and uv
description: Install a runner-cached Python, install uv, and sync the dev environment.

inputs:
  python-version:
    description: Python version to use.
    required: true
  extras:
    description: Space-separated optional dependency extras to sync.
    required: false
    default: dev

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
    - uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock
        prune-cache: false
    - name: Sync dev environment
      shell: bash
      env:
        EXTRAS: ${{ inputs.extras }}
      run: |
        args=(uv sync --locked --python "$(python -c 'import sys; print(sys.executable)')")
        for extra in $EXTRAS; do
          if [[ "$extra" != "none" ]]; then
            args+=(--extra "$extra")
          fi
        done
        "${args[@]}"
